name: Weekly CWV monitoring

on:
  schedule:
    - cron: "0 6 * * 1"  # Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      tenant:
        description: "Tenant slug"
        default: "artifation"
        required: true

permissions:
  contents: write

concurrency:
  group: cwv-${{ github.event.inputs.tenant || 'artifation' }}

jobs:
  measure:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Run CWV job
        env:
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx src/pipeline/cwvJob.ts --tenant=${{ github.event.inputs.tenant || 'artifation' }}

      - name: Commit run log
        if: success()
        run: |
          git config user.name "blog-bot"
          git config user.email "blog-bot@artifation.nl"
          git add data/cwv-runs/
          git diff --staged --quiet || git commit -m "chore(state): cwv run $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push

      - name: Upload run log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cwv-${{ github.run_id }}
          path: data/cwv-runs/
          retention-days: 60
          if-no-files-found: ignore
