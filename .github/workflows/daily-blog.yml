name: Daily blog generator

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:
    inputs:
      tenant:
        description: "Tenant slug"
        default: "artifation"
        required: true

permissions:
  contents: write

concurrency:
  group: daily-blog-${{ github.event.inputs.tenant || 'artifation' }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          # Opt-in USD guardrail (unset = no cap). Set as a repo variable.
          MAX_RUN_USD: ${{ vars.MAX_RUN_USD }}
        run: npx tsx src/pipeline/orchestrator.ts --tenant=${{ github.event.inputs.tenant || 'artifation' }}

      - name: Commit state updates
        if: success()
        run: |
          git config user.name "blog-bot"
          git config user.email "blog-bot@artifation.nl"
          # topics.yaml = the topic queue; editorial-reviews = the EU AI Act human-
          # review audit trail; anchor-history = the internal-link anchor cache.
          # All three were written to the ephemeral runner FS and lost before this.
          git add tenants/*/topics.yaml data/editorial-reviews/ data/anchor-history-*.json
          git diff --staged --quiet || git commit -m "chore(state): topic queue + audit trail update from $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase origin main
          git push

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: run-log-${{ github.run_id }}
          path: data/runs/
          retention-days: 30
          if-no-files-found: ignore
