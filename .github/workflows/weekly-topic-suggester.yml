name: Weekly topic suggester
on:
  schedule:
    - cron: "0 8 * * 1"  # Monday 08:00 UTC
  workflow_dispatch:
    inputs:
      tenant:
        description: "Tenant slug"
        default: "artifation"
        required: true

permissions:
  contents: write

concurrency:
  group: topic-suggester-${{ github.event.inputs.tenant || 'artifation' }}

jobs:
  suggest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Run topic-suggester job
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx src/pipeline/topicSuggesterJob.ts --tenant=${{ github.event.inputs.tenant || 'artifation' }}
      - name: Commit proposed topics + snapshot
        if: success()
        run: |
          git config user.name "blog-bot"
          git config user.email "blog-bot@artifation.nl"
          git add tenants/*/topics.yaml data/competitor-snapshots/
          git diff --staged --quiet || git commit -m "chore(state): topic proposals + snapshot $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
