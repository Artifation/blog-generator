# tenants/artifation/config.yaml
slug: artifation
domain: artifation.nl
language: nl-NL

brand:
  name: Artifation
  voice: |
    Informeel-direct, jij/jouw-vorm. Probleem-eerst (begin met de pijn van de MKB-eigenaar).
    Concrete getallen en ROI-focus boven abstracte beloften. Korte zinnen mixen met langere.
    Geen jargon zonder uitleg, maar engelse AI-termen ("prompt", "agent") zijn OK.
  ban_list:
    - "in conclusion"
    - "to sum up"
    - "tot slot"
    - "samenvattend"
    - "in een wereld waar"
    - "in today's fast-paced"
    - "in de steeds veranderende wereld"
    - "delve"
    - "leverage"
    - "harness the power of"
    - "unlock the potential"
    - "navigate the complexities"
    - "moreover"
    - "furthermore"
    - "additionally"
    - "notably"
    - "it's worth noting"
    - "het is belangrijk om op te merken"
  signature_phrases:
    - "Wij kijken verder dan de hype"
    - "De kortste weg naar een schaalbaar bedrijf"
  # update monthly: review fresh AI output for new clichés en voeg toe aan ban_list
  banlist_last_updated: "2026-05-09"
  reading_level_targets:
    ai-per-afdeling: { min: 50, max: 65 }
    ai-bewustwording: { min: 60, max: 75 }
    ai-tools-en-cases: { min: 55, max: 70 }

author:
  name: "Julian Dunsbergen"
  linkedin: "https://www.linkedin.com/in/julian-dunsbergen-203252248"
  bio: "Mede-oprichter van Artifation. Helpt Nederlandse MKB-bedrijven AI praktisch en duurzaam in te zetten — van eerste experimenten tot integratie in dagelijkse processen."
  photo_url: "https://artifation.nl/wp-content/uploads/julian-dunsbergen.jpg"  # upload echte foto naar WP-media-library en vervang URL als die anders is

organization:
  legal_name: "Artifation"  # vennootschap onder firma (VOF) per algemene voorwaarden artifation.nl
  kvk: "99459590"
  btw: "REPLACE_ME_BTW"  # check je KvK-uittreksel of een eigen factuur — formaat NL...B01
  address: "Van Goghstraat 17, 7701 ZL Dedemsvaart"

wordpress:
  base_url: https://artifation.nl
  user_secret_ref: WP_USER
  app_password_secret_ref: WP_APP_PASSWORD

email:
  # TIJDELIJK: Resend's default sender (gratis tier, geen domain-verificatie vereist).
  # Werkt alleen omdat `to` jouw eigen verified Resend-account-email is.
  # SWITCH TERUG NAAR "blog-bot@mail.artifation.nl" zodra DNS-publicatie werkt
  # (Hostinger support-ticket: zone-publicatie naar ns1.dns-parking.com werkt niet).
  from: "onboarding@resend.dev"
  to: "julian@artifation.nl"
  reply_to: "julian@artifation.nl"

pillars:
  - id: ai-per-afdeling
    weight: 0.5
  - id: ai-act
    weight: 0.3
  - id: sector-extensie
    weight: 0.2

quality_threshold: 8.0
max_posts_per_week_published: 2

features:
  internal_linker:
    enabled: true
    max_links_per_run: 10
    lookback_posts: 50
    exclude_post_ids: []
  ai_detection:
    enabled: false
    provider: gptzero
    threshold_max_ai_pct: 80
  indexnow:
    enabled: false
    key_secret_ref: INDEXNOW_KEY
  # AI-crawler strategie: blokkeer training-crawlers, sta retrieval/search toe.
  # Belangrijk: ClaudeBot (training) is NIET hetzelfde als Anthropic's search-crawler.
  ai_crawlers:
    GPTBot: block
    OAI-SearchBot: allow
    ClaudeBot: block
    PerplexityBot: allow
    Google-Extended: block
    Applebot-Extended: block
    Meta-ExternalAgent: block
  anchor_tracker:
    enabled: false
    max_exact_match_per_url: 3
    cache_ttl_hours: 24
  cwv_monitoring:
    enabled: false
    alert_on_poor: true
    psi_api_key_secret_ref: PSI_API_KEY
  repurposer:
    enabled: false
    formats: []   # ["linkedin", "newsletter", "xthread"] om aan te zetten
  search_console:
    enabled: false
    property_url: "sc-domain:artifation.nl"  # vereist GSC_SERVICE_ACCOUNT_JSON secret
  topic_suggester:
    enabled: false
    competitor_domains: []
    max_proposals_per_week: 5
    expire_after_weeks: 4
